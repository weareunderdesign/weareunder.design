<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ūnder</title>
    <link rel="stylesheet" href="https://renecss.org/rene.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/2.0.3/marked.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>

</head>

<body>
    <div class="view padding-xl margin-auto" id="markdown-content" style="max-width:820px"></div>

    <under-footer></under-footer>
</body>

<script>
    async function loadMarkdownContent() {
        try {
            const response = await fetch('underground.md');
            const markdownText = await response.text();

            marked.setOptions({
                headerIds: false,
                mangle: false
            });

            const renderer = new marked.Renderer();

            const slugify = (t) => t.replace(/<[^>]*>/g, '').toLowerCase().trim().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');

            renderer.heading = function (text, level) {
                if (level === 2) {
                    return `<h${level} id="${slugify(text)}">${text}</h${level}>`;
                }
                if (level === 5) {
                    return `<h${level}>${text}</h${level}>`;
                }
                if (level === 6) {
                    return `<h${level}>${text}</h${level}>`;
                }
                return `<h${level}>${text}</h${level}>`;
            };

            renderer.paragraph = function (text) {
                return `<p>${text}</p>`;
            };

            // Добавляем обработку таблиц
            renderer.table = function (header, body) {
                return `
                    <table>
                        <thead>${header}</thead>
                        <tbody>${body}</tbody>
                    </table>
                `;
            };

            renderer.tablerow = function (content) {
                return `<tr>${content}</tr>`;
            };

            renderer.tablecell = function (content, flags) {
                const type = flags.header ? 'th' : 'td';
                return `<${type}>${content}</${type}>`;
            };

            marked.setOptions({ renderer });

            const htmlContent = marked(markdownText);
            document.getElementById('markdown-content').innerHTML = htmlContent;

        } catch (error) {
            console.error('Error loading markdown:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', loadMarkdownContent);
</script>

<script src="./js/footer.js"></script>

</html>
