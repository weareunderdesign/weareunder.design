<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-54NVWMCH');</script>
  <script defer data-domain="weareunder.design" src="https://plausible.io/js/plausible.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="under store">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32.png">
  <link rel="stylesheet" href="https://renecss.org/rene.css" />
  <style>
    under-store { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--xl); }
    under-store:has(.product-detail) { display: block; }
    .product-card { text-decoration: none; color: inherit; }
    .product-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: var(--xl); }
    .product-info { position: sticky; top: 120px; align-self: start; }
    .buy-btn, .variant-select, .qty-btn { border: 1px solid currentColor; background: none; color: inherit; padding: var(--xs) var(--m); cursor: pointer; font: inherit; }
    .buy-btn { width: fit-content; }
    .buy-btn:hover { color: var(--background); background: var(--foreground); }
    .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .qty-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; padding: 0; }
    .cart-toggle { position: fixed; top: 40px; right: 40px; z-index: 1000; cursor: pointer; mix-blend-mode: difference; color: white; background: none; border: none; font: inherit; }
    #cart-count { font-size: .75em; vertical-align: super; }
    #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 1001; opacity: 0; pointer-events: none; transition: opacity .2s; }
    #cart-overlay.open { opacity: 1; pointer-events: auto; }
    #cart-drawer { position: fixed; top: 0; right: 0; width: 380px; max-width: 90vw; height: 100vh; z-index: 1002; padding: var(--xl); display: flex; flex-direction: column; background: var(--background, #fff); color: var(--foreground, #000); transform: translateX(100%); transition: transform .25s ease; overflow: auto; }
    #cart-drawer.open { transform: translateX(0); }
    @media (max-width: 768px) { .product-layout { grid-template-columns: 1fr; } }
  </style>
  <title>store | under</title>
</head>
<body data-theme="light">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/header.js"></script>
  <under-navigation></under-navigation>
  <button class="cart-toggle" onclick="openCart()">cart <span id="cart-count" style="display:none"></span></button>
  <div class="padding-xl" style="padding-top:120px">
    <h1 class="text-xl" style="margin-bottom:var(--xl)">store</h1>
    <under-store></under-store>
  </div>
  <script src="../js/shop.js"></script>
  <script src="../js/footer.js"></script>
  <under-footer></under-footer>
</body>
</html>
